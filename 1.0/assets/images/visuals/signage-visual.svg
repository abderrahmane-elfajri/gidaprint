<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Signage mockup</title>
  <desc id="desc">Premium storefront signage mockup with rigid panels, flags and a billboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071726"/>
      <stop offset="50%" stop-color="#0E416C"/>
      <stop offset="100%" stop-color="#0C7A8F"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFD"/>
      <stop offset="100%" stop-color="#DDE9F2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2C65C"/>
      <stop offset="100%" stop-color="#FF8665"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#04111E" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <g opacity="0.12">
    <rect x="80" y="110" width="1040" height="680" rx="36" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <path d="M110 220h980M110 320h980M110 420h980M110 520h980M110 620h980" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="140" y="210" width="330" height="480" rx="34" fill="#113B64"/>
    <rect x="168" y="238" width="274" height="424" rx="28" fill="url(#panel)"/>
    <rect x="208" y="274" width="194" height="194" rx="24" fill="#DCE7EF"/>
    <rect x="208" y="492" width="194" height="36" rx="18" fill="#0F355C"/>
    <rect x="208" y="542" width="140" height="18" rx="9" fill="#A5B6C6"/>
    <rect x="208" y="572" width="164" height="18" rx="9" fill="#A5B6C6"/>
    <circle cx="356" cy="360" r="38" fill="url(#accent)"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="530" y="180" width="498" height="240" rx="30" fill="#0F355C"/>
    <rect x="562" y="212" width="434" height="176" rx="20" fill="#F8FBFD"/>
    <rect x="592" y="246" width="260" height="18" rx="9" fill="#0F355C"/>
    <rect x="592" y="280" width="202" height="14" rx="7" fill="#B7C7D6"/>
    <rect x="592" y="308" width="324" height="14" rx="7" fill="#B7C7D6"/>
    <rect x="592" y="336" width="168" height="34" rx="12" fill="url(#accent)"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="614" y="482" width="404" height="232" rx="28" fill="#F8FBFD"/>
    <rect x="644" y="512" width="104" height="170" rx="18" fill="#DCE7EF"/>
    <rect x="766" y="512" width="104" height="170" rx="18" fill="#DCE7EF"/>
    <rect x="888" y="512" width="102" height="170" rx="18" fill="#DCE7EF"/>
    <rect x="664" y="552" width="64" height="16" rx="8" fill="#0F355C"/>
    <rect x="786" y="552" width="64" height="16" rx="8" fill="#0F355C"/>
    <rect x="908" y="552" width="60" height="16" rx="8" fill="#0F355C"/>
