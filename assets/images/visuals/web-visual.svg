<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Website creation mockup</title>
  <desc id="desc">Premium laptop and smartphone website mockup with clean interface cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081529"/>
      <stop offset="50%" stop-color="#123D67"/>
      <stop offset="100%" stop-color="#0F758B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
